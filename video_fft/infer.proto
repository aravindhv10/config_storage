syntax = "proto3";

package myrdvideoinferinfer;

service Rdvideoinfer {
  rpc Doinfer(Grpcvideodata) returns (Grpcvideopredictionreply) {}
}

message Grpcvideodata {
    bytes data = 1;
}

message Version {
    uint32 major = 1;
    uint32 minor = 2;
    uint32 patch = 3;
}

message Grpcvideoprediction {
    float pa = 1;
    float pb = 2;
    float pc = 3;
}

message Grpcimgprediction {
    uint32 arm = 1; 
    uint32 rail = 2; 
    uint32 leg = 3; 
    uint32 pos = 4; 
    uint32 bed = 5; 
}

message Grpcvideopredictionreply {
    repeated Grpcvideoprediction preds = 1;
    float majority = 2;
    repeated Grpcimgprediction imgpreds = 3;
    Version vidver = 4;
    bytes videohash = 5;
    uint64 timestamp = 6;
    repeated float cvusability = 7;
}
